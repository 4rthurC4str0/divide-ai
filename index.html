    <div id="admin-app" class=" admin-display">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Divide Aí</h2>
                <p>Hamburgueria Iphome</p>    
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" pagina="dashboard" onclick="navigate('dashboard')">
                    Dashboard
                </button>
                <button class="nav-item" pagina="pedidos" onclick="navigate('pedidos')">
                    Pedidos
                </button>
                <button class="nav-item" pagina="mesas" onclick="navigate('mesas')">
                    Mesas
                </button>
                <button class="nav-item" pagina="cardapio" onclick="navigate('cardapio')">
                    Cardápio
                </button>
                <button class="nav-item" pagina="pagamentos" onclick="navigate('pagamentos')">
                    Pagamentos
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-nav-footer" >Sair</button>
            </div>
        </aside>
        

        <main class="admin-content">
            <section class="section-dashboard">
                <div class="admin-page-header">
                    <h1>Dashboard</h1>
                    <p>Visão geral do restaurante</p>
                </div>

                <div class="status-header">
                    <div class="card-status-header">
                        <div class="status-title">Pedidos ativos</div>
                        <div class="status-content">4</div>
                        <div class="status-desc">5 total</div>
                    </div>
                    <div class="card-status-header">
                        <div class="status-title">Receita hoje</div>
                        <div class="status-content">R$ 300,00</div>
                        <div class="status-desc">2 pagamentos</div>
                    </div>
                    <div class="card-status-header">
                        <div class="status-title">Mesas </div>
                        <div class="status-content">5/12</div>
                        <div class="status-desc">6 disponiveis</div>
                    </div>
                </div>

            </section>


            <section class="section-pedidos hidden">Pedidos</section>
            <section class="section-mesas hidden">Mesas</section>
            <section class="section-cardapio hidden">Cardápio</section>
            <section class="section-pagamentos hidden">Pagamentos</section>
        </main>

    </div>

    <script src="js/admin.js"></script>
